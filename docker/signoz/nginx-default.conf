server {
  listen       3301;
  server_name  _;

  # Use Docker's embedded DNS (127.0.0.11) and re-resolve every 10s so we pick up
  # query-service's new IP whenever it restarts. Without this, nginx caches the IP
  # at startup and gives "connection refused" after any query-service restart.
  resolver 127.0.0.11 valid=10s ipv6=off;

  gzip on;
  gzip_static on;
  gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_proxied  any;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;

  client_max_body_size 24M;
  large_client_header_buffers 8 128k;

  location /api {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # The `set` + variable forces nginx to re-resolve per request rather than
    # caching the upstream IP at startup. Critical for Docker-network upstreams.
    set $signoz_query_upstream "signoz-query-service:8080";
    proxy_pass http://$signoz_query_upstream;
  }

  location /ws {
    proxy_http_version 1.1;
    proxy_set_header Host       $host;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    set $signoz_ws_upstream "signoz-query-service:8080";
    proxy_pass http://$signoz_ws_upstream;
  }

  location / {
    root  /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
