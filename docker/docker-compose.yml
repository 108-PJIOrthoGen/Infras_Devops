# PJI Advisor - Docker Compose

# Usage:
#   docker compose up -d         # Khởi chạy toàn bộ stack
#   docker compose logs -f       # Xem logs
#   docker compose down          # Dừng tất cả

x-clickhouse-defaults: &clickhouse-defaults
  image: clickhouse/clickhouse-server:24.1.2-alpine
  restart: on-failure
  tty: true
  logging:
    options:
      max-size: 50m
      max-file: "3"
  healthcheck:
    test: [ "CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping" ]
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144

x-signoz-db-depend: &signoz-db-depend
  depends_on:
    clickhouse:
      condition: service_healthy
    otel-collector-migrator-sync:
      condition: service_completed_successfully

services:
  # REVERSE PROXY - Caddy
  # Entry point duy nhất, tự động SSL via Let's Encrypt
  caddy:
    image: caddy:2-alpine
    container_name: pji-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # NOTE: Caddyfile mounted from named volume `pji_caddy_config` to dodge
      # Docker Desktop fileshare cache on removable drives. Repopulate with:
      #   docker run --rm -i -v pji_caddy_config:/d alpine sh -c 'cat > /d/Caddyfile' < ../Caddyfile
      # On the production server (no fileshare cache), change back to:
      #   - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - pji_caddy_config:/etc/caddy:ro
      - caddy_data:/data # SSL certificates
      - caddy_config:/config
    networks:
      - frontend-net
    depends_on:
      pji-frontend:
        condition: service_healthy
      pji-backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "caddy", "version" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Fe - React/TypeScript
  pji-frontend:
    image: ${DOCKERHUB_REPO:-local}/pji-frontend:${IMAGE_TAG:-latest}
    container_name: pji-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - frontend-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Be - Spring Boot
  pji-backend:
    image: ${DOCKERHUB_REPO:-local}/pji-backend:${IMAGE_TAG:-latest}
    container_name: pji-backend
    restart: unless-stopped
    # Port 8085 expose nội bộ, Caddy proxy vào
    expose:
      - "8085"
    environment:
      # Spring profiles
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pji_advisor}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pji_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Postgres password required}
      JWT_BASE64_SECRET: ${JWT_BASE64_SECRET:?JWT secret required}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?CORS origins required}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}

      # RabbitMQ
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-pji_user}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ password required}

      # MinIO (binds to integration.minio.* in application.yaml)
      # INTEGRATION_MINIO_URL = internal endpoint backend uses for put/get/delete (Docker network)
      # INTEGRATION_MINIO_PUBLIC_URL = public endpoint baked into presigned URLs (browsers fetch this)
      INTEGRATION_MINIO_URL: ${INTEGRATION_MINIO_URL:-http://minio:9000}
      INTEGRATION_MINIO_PUBLIC_URL: ${INTEGRATION_MINIO_PUBLIC_URL:-${INTEGRATION_MINIO_URL:-http://minio:9000}}
      INTEGRATION_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MinIO access key required}
      INTEGRATION_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MinIO secret key required}
      INTEGRATION_MINIO_PRESIGNED_EXPIRY_MINUTES: ${INTEGRATION_MINIO_PRESIGNED_EXPIRY_MINUTES:-60}
      MINIO_BUCKET: ${MINIO_BUCKET:-pji-documents}

      # Internal AI service URL
      AI_SERVICE_URL: http://pji-rag-service:8000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:?AI service API key required}

      # SMTP for password recovery OTP email (MAIL_HOST binds to spring.mail.host)
      MAIL_HOST: ${MAIL_HOST:?SMTP host required}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?SMTP username required}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?SMTP password required}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      PASSWORD_RECOVERY_MAIL_FROM: ${PASSWORD_RECOVERY_MAIL_FROM:?Password recovery sender email required}

      # OpenTelemetry — Spring Micrometer OTLP exporter uses HTTP (port 4318), not gRPC (4317).
      # The /v1/traces path suffix is required by Spring's management.otlp.tracing.endpoint.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_SERVICE_NAME: pji-backend
      OTEL_RESOURCE_ATTRIBUTES: "service.version=${IMAGE_TAG:-latest},deployment.environment=${SPRING_PROFILES_ACTIVE:-prod}"

      # Diagnostics (override in production by removing show-details=always)
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS:-never}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${HEALTH_MAIL_ENABLED:-true}

      # JVM options
      JAVA_OPTS: >-
        -Xms512m -Xmx1024m -XX:+UseG1GC
    networks:
      - frontend-net
      - backend-net
      - monitoring-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8085/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Spring Boot cần thời gian khởi động
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '2.0'

  # RAG SERVICE - FastAPI (Adaptive RAG + Groq LLM + Cohere + Zilliz)
  pji-rag-service:
    image: ${DOCKERHUB_REPO:-local}/pji-rag-service:${IMAGE_TAG:-latest}
    container_name: pji-rag-service
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # RabbitMQ — queue names must match Spring Boot RabbitMQConfig
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-pji_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      RABBITMQ_EXCHANGE: pji.ai.exchange
      RABBITMQ_RECOMMENDATION_QUEUE: pji.ai.recommendation.queue
      RABBITMQ_RECOMMENDATION_RESULT_ROUTING_KEY: ai.recommendation.result

      # LLM — OpenRouter (matches Rag_Agentic/app/config.py)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OpenRouter API key required}
      MAIN_MODEL: ${MAIN_MODEL:-deepseek/deepseek-chat}
      FAST_MODEL: ${FAST_MODEL:-qwen/qwen-2.5-7b-instruct}
      FACTUAL_MODEL: ${FACTUAL_MODEL:-google/gemma-2-27b-it}
      ANALYTICAL_MODEL: ${ANALYTICAL_MODEL:-qwen/qwen-2.5-72b-instruct}
      OPINION_MODEL: ${OPINION_MODEL:-deepseek/deepseek-chat}
      CONTEXTUAL_MODEL: ${CONTEXTUAL_MODEL:-mistralai/mistral-large}
      SYNTHESIS_MODEL: ${SYNTHESIS_MODEL:-openai/gpt-oss-120b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RERANK_MODEL: ${RERANK_MODEL:-cohere/rerank-v3.5}

      # Vector DB — Qdrant
      QDRANT_URL: ${QDRANT_URL:?Qdrant URL required}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?Qdrant API key required}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag-collection}

      # Web search fallback
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

      # API key auth — must match AI_SERVICE_API_KEY on pji-backend
      REQUIRE_API_KEY: "true"
      API_KEYS: ${AI_SERVICE_API_KEY:?AI service API key required}
      CORS_ORIGINS: '["${APP_CORS_ALLOWED_ORIGINS}"]'

      # RabbitMQ tuning
      RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT:-1}

      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: pji-rag-service

      # Pydantic strict validation
      PYDANTIC_STRICT: "true"
    networks:
      - backend-net
      - rag-net
      - monitoring-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G # RAG + embeddings cần nhiều RAM
          cpus: '4.0'

  # =============================================================================
  # EXTRACT IMAGES - FastAPI extractor + RabbitMQ worker
  # =============================================================================
  pji-extract-api:
    image: ${DOCKERHUB_REPO:-local}/pji-extract-api:${IMAGE_TAG:-latest}
    container_name: pji-extract-api
    restart: unless-stopped
    command: uvicorn extractor.api.app:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-pji_user}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ password required}
      RABBITMQ_QUEUE: ${EXTRACT_QUEUE:-image_processing}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: pji-extract-api
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net
      - rag-net
      - monitoring-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  pji-extract-worker:
    image: ${DOCKERHUB_REPO:-local}/pji-extract-worker:${IMAGE_TAG:-latest}
    container_name: pji-extract-worker
    restart: unless-stopped
    command: python -m extractor.worker.consumer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-pji_user}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ password required}
      RABBITMQ_QUEUE: ${EXTRACT_QUEUE:-image_processing}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: pji-extract-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net
      - rag-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # =============================================================================
  # VOICE INTERACTION — DISABLED for this deployment.
  # Re-enable by uncommenting and adding build/push stages in Jenkinsfile.
  # =============================================================================
  # pji-voice-gateway:
  #   image: ${DOCKERHUB_REPO:-local}/pji-voice-gateway:${IMAGE_TAG:-latest}
  #   container_name: pji-voice-gateway
  #   restart: unless-stopped
  #   expose:
  #     - "8000"
  #   environment:
  #     ASR_API_KEY: ${ASR_API_KEY:?ASR API key required}
  #     TTS_API_KEY: ${TTS_API_KEY:?TTS API key required}
  #     OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  #     OTEL_SERVICE_NAME: pji-voice-gateway
  #   depends_on:
  #     - pji-voice-orchestrator
  #   networks:
  #     - backend-net
  #     - rag-net
  #     - monitoring-net
  #
  # pji-voice-orchestrator:
  #   image: ${DOCKERHUB_REPO:-local}/pji-voice-orchestrator:${IMAGE_TAG:-latest}
  #   container_name: pji-voice-orchestrator
  #   restart: unless-stopped
  #   expose:
  #     - "8001"
  #   environment:
  #     ASR_API_KEY: ${ASR_API_KEY:?ASR API key required}
  #     TTS_API_KEY: ${TTS_API_KEY:?TTS API key required}
  #     CHATBOT_API_KEY: ${CHATBOT_API_KEY:?Chatbot API key required}
  #     CHATBOT_BASE_URL: ${CHATBOT_BASE_URL:-https://openrouter.ai/api/v1}
  #     CHATBOT_MODEL: ${CHATBOT_MODEL:-google/gemini-2.0-flash-001}
  #     OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  #     OTEL_SERVICE_NAME: pji-voice-orchestrator
  #   networks:
  #     - backend-net
  #     - rag-net
  #     - monitoring-net

  # DATABASE - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: pji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pji_advisor}
      POSTGRES_USER: ${POSTGRES_USER:-pji_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Postgres password required}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro # SQL init scripts (path relative to deploy root)
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pji_user} -d ${POSTGRES_DB:-pji_advisor}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    # Cấu hình thêm cho production
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=128MB
        -c max_connections=100
        -c log_min_duration_statement=1000

  # CACHE - Redis
  redis:
    image: redis:7-alpine
    container_name: pji-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?Redis password required}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MESSAGE BROKER - RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pji-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pji_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RabbitMQ password required}
      RABBITMQ_DEFAULT_VHOST: /
      # Erlang cookie cho clustering sau này
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-pji-secret-cookie}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      # Management UI - chỉ expose khi dev/debug, production nên bỏ
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - backend-net
      - rag-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # OBJECT STORAGE - MinIO (file uploads)
  minio:
    image: minio/minio:latest
    container_name: pji-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MinIO access key required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MinIO secret key required}
    volumes:
      - minio_data:/data
    ports:
      # Console UI - tương tự RabbitMQ, production nên restrict
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
  # =============================================================================
  # OBSERVABILITY - SigNoz (All-in-One: replaces Prometheus / Loki / Grafana / Jaeger)
  # =============================================================================
  zookeeper-1:
    image: zookeeper:3.9.5
    container_name: signoz-zookeeper-1
    hostname: zookeeper-1
    user: root
    restart: unless-stopped
    volumes:
      - signoz_zookeeper_data:/data
    environment:
      - ZOO_MY_ID=1
      - ZOO_AUTOPURGE_PURGEINTERVAL=1
      - ZOO_4LW_COMMANDS_WHITELIST=mntr,conf,ruok
    networks:
      - monitoring-net

  clickhouse:
    <<: *clickhouse-defaults
    container_name: signoz-clickhouse
    hostname: clickhouse
    depends_on:
      - zookeeper-1
    volumes:
      - ./docker/signoz/clickhouse-config.xml:/etc/clickhouse-server/config.xml
      - ./docker/signoz/clickhouse-users.xml:/etc/clickhouse-server/users.xml
      - ./docker/signoz/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./docker/signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./docker/signoz/user_scripts:/var/lib/clickhouse/user_scripts/
      - signoz_clickhouse_data:/var/lib/clickhouse/
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  otel-collector-migrator-sync:
    image: signoz/signoz-schema-migrator:${OTELCOL_TAG:-0.111.16}
    container_name: signoz-otel-migrator-sync
    command: [ "sync", "--dsn=tcp://clickhouse:9000", "--up=" ]
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - monitoring-net

  otel-collector-migrator-async:
    image: signoz/signoz-schema-migrator:${OTELCOL_TAG:-0.111.16}
    container_name: signoz-otel-migrator-async
    command: [ "async", "--dsn=tcp://clickhouse:9000", "--up=" ]
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector-migrator-sync:
        condition: service_completed_successfully
    networks:
      - monitoring-net

  alertmanager:
    image: signoz/alertmanager:${ALERTMANAGER_TAG:-0.23.7}
    container_name: signoz-alertmanager
    restart: unless-stopped
    command:
      - --queryService.url=http://query-service:8085
      - --storage.path=/data
    volumes:
      - signoz_alertmanager_data:/data
    depends_on:
      query-service:
        condition: service_healthy
    networks:
      - monitoring-net

  query-service:
    image: signoz/query-service:${SIGNOZ_TAG:-0.64.0}
    container_name: signoz-query-service
    restart: unless-stopped
    command:
      - "-config=/root/config/prometheus.yml"
      - "--use-logs-new-schema=true"
      - "--use-trace-new-schema=true"
    volumes:
      - ./docker/signoz/prometheus.yml:/root/config/prometheus.yml
      - signoz_data:/var/lib/signoz/
    environment:
      - ClickHouseUrl=tcp://clickhouse:9000
      - ALERTMANAGER_API_PREFIX=http://alertmanager:9093/api/
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
      - DASHBOARDS_PATH=/root/config/dashboards
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone-amd
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-net
    <<: *signoz-db-depend

  signoz-frontend:
    image: signoz/frontend:${SIGNOZ_TAG:-0.64.0}
    container_name: signoz-frontend
    restart: unless-stopped
    depends_on:
      - alertmanager
      - query-service
    # SigNoz UI - bind to localhost; expose externally via Caddy if needed
    ports:
      - "127.0.0.1:${SIGNOZ_UI_PORT:-3301}:3301"
    volumes:
      # Override broken default (location = /api exact-match) shipped in 0.64.0 image
      - ./docker/signoz/nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - monitoring-net

  otel-collector:
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-0.111.16}
    container_name: signoz-otel-collector
    hostname: otel-collector
    restart: unless-stopped
    user: root
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--manager-config=/etc/manager-config.yaml"
      - "--copy-path=/var/tmp/collector-config.yaml"
      - "--feature-gates=-pkg.translator.prometheus.NormalizeName"
    volumes:
      - ./docker/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./docker/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /:/hostfs:ro
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector-migrator-sync:
        condition: service_completed_successfully
      query-service:
        condition: service_healthy
    networks:
      - monitoring-net

  logspout:
    image: gliderlabs/logspout:v3.2.14
    container_name: signoz-logspout
    restart: unless-stopped
    command: syslog+tcp://otel-collector:2255
    volumes:
      - /etc/hostname:/etc/host_hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - otel-collector
    networks:
      - monitoring-net

  # =============================================================================
  # NETWORKS - Phân tách để tăng security
  # =============================================================================
networks:
  # Frontend: Caddy ↔ Frontend SPA ↔ Backend API
  frontend-net:
    driver: bridge

  # Backend: Backend ↔ PostgreSQL ↔ Redis ↔ MinIO ↔ RabbitMQ
  backend-net:
    driver: bridge

  # RAG: RAG Service ↔ RabbitMQ
  rag-net:
    driver: bridge

  # Monitoring: SigNoz stack ↔ Backend / RAG service (telemetry export)
  monitoring-net:
    driver: bridge

# VOLUMES - Persistent data
volumes:
  pji_caddy_config:
    external: true
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  rag_data:
  signoz_zookeeper_data:
  signoz_clickhouse_data:
  signoz_alertmanager_data:
  signoz_data:
